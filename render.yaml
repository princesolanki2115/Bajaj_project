services:
  - type: web
    name: deskflow-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://deskflow-triage-0827cs.netlify.app
      - key: MONGODB_URI
        sync: false
